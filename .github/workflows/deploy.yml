name: Deploy to GitHub Pages

# Triggers whenever code is pushed to main (or merged via PR)
on:
  push:
    branches: [main]
  workflow_dispatch:  # also lets you trigger it manually from GitHub UI

# Needed so the workflow can push to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Vite uses base: '/Physiotherapy-Demo/' so all asset paths are correct for Pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
